<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目技术分析 — AI 资讯周报</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 900px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #60a5fa;
      font-size: 0.85rem;
      text-decoration: none;
      border: 1px solid #1d3a6b;
      border-radius: 6px;
      padding: 0.35rem 0.9rem;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .back-link:hover { background: #1a2a4a; border-color: #60a5fa; }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .image-container {
      background: #1e2130;
      border: 1px dashed #2d3348;
      border-radius: 12px;
      overflow: hidden;
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .placeholder {
      text-align: center;
      color: #3b4a6b;
    }
    .placeholder p { margin-top: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="back-link" href="index.html">← 返回周报</a>
      <h1>🔧 项目技术分析</h1>
    </header>

    <div class="image-container">
      <!-- 将 img 标签替换到这里，例如：
      <img src="your-image.png" alt="项目技术分析" />
      -->
      <div class="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3b4a6b" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>在此处放置技术分析图片</p>
      </div>
    </div>
  </div>
</body>
</html>
